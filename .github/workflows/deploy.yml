name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      runner:
        description: "Runner label (default: self-hosted; choose ubuntu-latest if self-hosted is unavailable)"
        required: false
        default: self-hosted
        type: choice
        options:
          - self-hosted
          - ubuntu-latest

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ${{ inputs.runner || 'self-hosted' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .site

  deploy:
    needs: build
    runs-on: ${{ inputs.runner || 'self-hosted' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
